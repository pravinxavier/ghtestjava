name: Java Application Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build job
    runs-on:
      - self-hosted
      - ubuntu-24.04-16core
      
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: build with MVN
        run: mvn clean install
      - name: run tests with MVN
        run: mvn test
      
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-demo-artifacts
          path: target/*.jar




