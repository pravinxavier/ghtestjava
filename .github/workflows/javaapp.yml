name: Java Application Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build job
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: build with MVN
        run: mvn clean install

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-demo-artifacts
          path: target/*.jar

  test:
    name: Create test report
    runs-on: ubuntu-latest
    needs: build

    permissions:
      checks: write

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: run tests with MVN
        run: mvn test

      - name: Junit test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit Test Report
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

  deploy:
    name: Deploy to production
    runs-on: docker-latest
    needs: test
    steps:
      - name: Deploy to production
        run: echo "Deploying to production environment..."